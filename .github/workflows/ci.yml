name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.28"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --locked
      - run: uv run python tools/vendor/sync_runtime_vendor.py --check
      - run: uv run python tools/release/generate_notices.py --check
      - run: uv run python tools/release/build_artifacts.py
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-python-${{ matrix.python-version }}
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/release-artifact-set.json
          if-no-files-found: error
          retention-days: 1
      - run: >-
          uv run pytest tests/unit tests/contracts tests/property tests/golden
          tests/integration tests/concurrency tests/packaging tests/e2e -q
      - run: uv run ruff check src tests tools
      - run: uv run mypy src
