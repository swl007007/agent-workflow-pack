name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --locked
      - run: uv run python tools/vendor/sync_runtime_vendor.py --check
      - run: uv run python tools/release/generate_notices.py --check
      - run: uv run python tools/release/build_artifacts.py
      - run: uv run pytest tests/packaging tests/integration/release tests/contracts/release -q
      - run: uv run ruff check src tests tools
      - run: uv run mypy src
