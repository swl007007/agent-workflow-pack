      render_projections:
        - {unit_id: instruction:opencode-project, target_path: .opencode/instructions/agent-workflow.md, ownership: pack-managed, merge_strategy: replace, mode: "0644", owning_surface_id: platform-adapter:opencode, template_id: opencode-instructions-v1, validator_ids: [utf8-text-v1], discoverable: true}
        - {unit_id: command:opencode-agent-stack, target_path: .opencode/commands/agent-stack.md, ownership: pack-managed, merge_strategy: replace, mode: "0644", owning_surface_id: platform-adapter:opencode, template_id: opencode-command-v1, validator_ids: [utf8-text-v1], discoverable: true}
        - {unit_id: hook:opencode:runtime-gate, target_path: .opencode/plugins/agent-workflow.js, ownership: pack-managed, merge_strategy: replace, mode: "0644", owning_surface_id: platform-adapter:opencode, template_id: opencode-plugin-v1, validator_ids: [javascript-v1], discoverable: false}
      wrapper_entries:
        - {operation: execute-light, runtime_entry_id: opencode-plan, allowed_modes: [native-light], allowed_phases: [], claim_policy: forbidden, command: [.agent-workflow/bin/agent-stack, route, execute-light]}
        - {operation: integrated-runtime-load, runtime_entry_id: trellis-implement, allowed_modes: [trellis-native], allowed_phases: [], claim_policy: forbidden, command: [.agent-workflow/bin/agent-stack, task, runtime, load]}
        - {operation: integrated-runtime-load, runtime_entry_id: heavy-development-router, allowed_modes: [speckit-superpowers], allowed_phases: [planning, implementing, verifying], claim_policy: required, command: [.agent-workflow/bin/agent-stack, task, runtime, load]}
      blocked_bypass_entries: [/speckit.implement, /trellis-implement, direct-trellis-archive]
      trellis_adapter_contract: *trellis_contract
