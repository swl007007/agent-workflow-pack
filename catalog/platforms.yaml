      project_instructions: opencode-project-instructions-v1
      project_skills: opencode-project-skills-v1
      provider_exception_approval: opencode-provider-approval-v1
      route_gated_catalog: opencode-route-catalog-v1
      task_admission_gate: opencode-task-admission-v1
      task_archive_gate: opencode-task-archive-v1
    minimum_capabilities: *strict_minimums
    adapter:
      schema_id: agent-workflow.platform-adapter
      schema_version: 1
      platform: opencode
